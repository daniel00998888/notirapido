name: Automatizacion de Noticias PulsoMX

on:
  schedule:
    - cron: '0 */4 * * *' # Se ejecutará a las 00:00, 04:00, 08:00, 12:00, etc.
  workflow_dispatch:      # Botón de ejecución manual

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar dependencias
        run: pip install -r requirements.txt
        
      - name: Ejecutar Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python bot.py
        
      - name: Guardar Cambios en GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/noticias.json
          git commit -m "🤖 Noticias actualizadas automáticamente" || exit 0
          git push
