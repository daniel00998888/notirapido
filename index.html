<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulsoMX | Noticias de México</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="bg-red-700 text-white shadow-md p-4">
        <h1 class="text-2xl font-bold text-center">⚡ PULSOMX</h1>
    </header>
    <main class="container mx-auto p-4 mt-8">
        <h2 class="text-xl font-bold mb-4">Últimas Noticias</h2>
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p>Cargando noticias...</p>
        </div>
    </main>
    <script>
        fetch("data/noticias.json")
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById("news-grid");
                grid.innerHTML = "";
                data.forEach(n => {
                    grid.innerHTML += `
                        <div class="bg-white p-4 rounded shadow">
                            <img src="${n.imagen}" class="w-full h-40 object-cover mb-2 rounded">
                            <h3 class="font-bold text-lg">${n.titulo}</h3>
                            <p class="text-sm text-gray-600">${n.resumen}</p>
                            <a href="${n.url_origen}" target="_blank" class="text-red-600 text-sm font-bold mt-2 inline-block">Leer más</a>
                        </div>`;
                });
            }).catch(() => document.getElementById("news-grid").innerHTML = "Esperando al bot...");
    </script>
</body>
</html>
